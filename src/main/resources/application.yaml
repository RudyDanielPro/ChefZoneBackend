spring:
  application:
    name: ChefZoneBackend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cloudinary:
  cloud-name: ${Cloud_Name}
  api-key: ${Cloud_Key}
  api-secret: ${Cloud_Api_Secret}


jwt:
  secret: ${Secret_key}
  expiration: 40000000 


server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always


logging:
  level:
    org:
      springframework:
        security: DEBUG
        web: DEBUG
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE